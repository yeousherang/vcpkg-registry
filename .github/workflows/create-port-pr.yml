name: Create Port PR from Issue

on:
  issues:
    types:
      - opened
      - labeled

permissions:
  issues: write
  contents: write
  pull-requests: write

jobs:
  create-port-pr:
    if: contains(github.event.issue.labels.*.name, 'add-port')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Save issue body
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          echo "$ISSUE_BODY" > issue_body.md

      - name: Create port files and update versions
        run: |
          chmod +x .github/scripts/create_port.py
          python .github/scripts/create_port.py issue_body.md

      - name: Run README update script
        run: |
          chmod +x .github/scripts/update_readme.py
          python .github/scripts/update_readme.py

      - name: Create branch and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH_NAME="add-port/${{ github.event.issue.number }}-${{ env.PORT_NAME }}"
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV

          # Create and checkout new branch
          git checkout -b $BRANCH_NAME

          # Stage changes
          git add ports/${{ env.PORT_NAME }} versions README.md

          # Commit and push
          git commit -m "feat: add port ${{ env.PORT_NAME }} from issue #${{ github.event.issue.number }}"
          git push origin $BRANCH_NAME

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "feat: add port ${{ env.PORT_NAME }} (closes #${{ github.event.issue.number }})" \
            --body "This PR was automatically generated from issue #${{ github.event.issue.number }} to add the \`${{ env.PORT_NAME }}\` port." \
            --head "${{ env.BRANCH_NAME }}" \
            --base main

      - name: Add comment to Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --body "🎉 포트 \`${{ env.PORT_NAME }}\` 생성을 위한 Pull Request가 자동으로 생성되었습니다! 관리자의 리뷰 후 머지될 예정입니다."
