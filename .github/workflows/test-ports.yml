name: Test Ports

on:
  pull_request:
    paths:
      - 'ports/**'
      - 'versions/**'
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * 0' # Every Sunday at 12:00 UTC (Periodic health checks)

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  test-ports:
    name: Build Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup vcpkg environment (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          echo "$VCPKG_INSTALLATION_ROOT" >> $GITHUB_PATH
          echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> $GITHUB_ENV

      - name: Setup vcpkg environment (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          echo "$env:VCPKG_INSTALLATION_ROOT" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Detect Changed Ports
        id: detect-ports
        shell: bash
        run: |
          PORTS=""
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin ${{ github.base_ref }} --depth=1
            PORTS=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep '^ports/' | cut -d/ -f2 | sort -u | tr '\n' ' ')
          fi
          
          if [ -z "$PORTS" ]; then
            # Exclude non-directories
            PORTS=$(find ports -maxdepth 1 -mindepth 1 -type d -exec basename {} \; | tr '\n' ' ')
          fi
          
          echo "ports=$PORTS" >> $GITHUB_OUTPUT
          echo "Detected ports to test: $PORTS"

      - name: Run Build Tests
        id: run-tests
        shell: bash
        run: |
          python3 .github/scripts/test_ports.py ${{ steps.detect-ports.outputs.ports }}

      - name: Comment PR (PR only)
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = 'test-results.md';
            if (fs.existsSync(path)) {
              let report = fs.readFileSync(path, 'utf8');
              report = `### 💻 Environment: **${{ matrix.os }}**\n` + report;
              
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: report
              });
            }

      - name: Create Issue on Failure (Non-PR only)
        if: failure() && github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if [ -f test-results.md ]; then
            REPORT=$(cat test-results.md)
          else
            REPORT="Build test execution failed before report generation."
          fi
          
          gh issue create \
            --title "🚨 Port Build Test Failed on ${{ matrix.os }}" \
            --body "Periodic check failed. Details below:\n\n$REPORT" \
            --label "bug"
